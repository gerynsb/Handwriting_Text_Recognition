name: htr_flutter
description: Handwriting Text Recognition Mobile App

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.0.0

dependencies:
  flutter:
    sdk: flutter

  # Network & API
  http: ^1.2.1
  
  # Image handling
  image_picker: ^1.1.2
  image_cropper: ^11.0.0
  
  # State management
  provider: ^6.1.2
  
  # Storage & persistence
  shared_preferences: ^2.2.3
  
  # UI
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  lottie: ^3.1.2
  
  # Date formatting
  intl: ^0.19.0
  
  # Permission handling
  permission_handler: ^11.3.1
  
  # Path provider
  path_provider: ^2.1.3
  
  # App info
  package_info_plus: ^8.0.0
  
  # UUID generation
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  # Add assets
  assets:
    - assets/icons/
    - assets/images/
    - assets/animations/
